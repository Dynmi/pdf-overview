<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PDF Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg: #f3ede0;
    --bg-top: #e6dcc7;
    --ink: #0f2340;
    --ink-soft: #4a5870;
    --rule: #dcd3bf;
    --panel: #f8f3e6;
    --accent: #b9491f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    color: var(--ink);
    background:
      linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 260px) no-repeat,
      var(--bg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  /* ===== Nav ===== */
  nav {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 28px 40px 20px;
  }
  nav .links {
    grid-column: 2;
    display: flex;
    gap: 36px;
    font-weight: 600;
    font-size: 15px;
  }
  nav .links a { padding-bottom: 4px; color: var(--ink-soft); }
  nav .links a.active { color: var(--ink); border-bottom: 2px solid var(--ink); }
  nav .avatar {
    grid-column: 3;
    justify-self: end;
    width: 30px; height: 30px;
    border: 1.5px solid var(--ink);
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--ink);
  }
  nav .avatar svg { width: 18px; height: 18px; }

  /* ===== Page ===== */
  main {
    max-width: 960px;
    margin: 28px auto 80px;
    padding: 0 40px;
  }
  .kicker {
    font-size: 12px;
    letter-spacing: 0.18em;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  h1.title {
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 800;
    font-size: clamp(40px, 6vw, 72px);
    line-height: 1.02;
    letter-spacing: -0.01em;
    margin: 14px 0 28px;
    color: var(--ink);
    word-break: break-word;
  }
  .meta {
    display: flex;
    gap: 32px;
    align-items: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    text-transform: uppercase;
    padding: 18px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .meta .item { display: flex; gap: 10px; align-items: center; }
  .meta svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; }

  /* ===== Overview table ===== */
  .panel {
    margin-top: 28px;
    background: var(--panel);
    border-radius: 6px;
    padding: 8px 24px;
  }
  table.overview {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  table.overview thead th {
    text-align: left;
    font-size: 12px;
    letter-spacing: 0.16em;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    padding: 20px 0 18px;
    border-bottom: 1px solid var(--rule);
  }
  table.overview thead th:first-child { width: 34%; padding-right: 32px; }
  table.overview tbody td {
    vertical-align: top;
    padding: 28px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 16px;
    line-height: 1.55;
  }
  table.overview tbody tr:last-child td { border-bottom: none; }
  table.overview tbody td.subtitle {
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1.2;
    padding-right: 32px;
    color: var(--ink);
  }
  table.overview tbody td.summary { color: var(--ink); }

  /* row entry animation */
  tr.section { animation: fadeUp 280ms ease-out both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  tr.pending td { color: var(--ink-soft); opacity: 0.6; }
  .skeleton {
    display: inline-block;
    height: 14px;
    background: linear-gradient(90deg, #e6dfcd, #efe8d4, #e6dfcd);
    background-size: 200% 100%;
    animation: shimmer 1.2s linear infinite;
    border-radius: 3px;
  }
  @keyframes shimmer {
    from { background-position: 200% 0; }
    to { background-position: -200% 0; }
  }

  /* ===== Upload view ===== */
  .drop {
    display: block;
    margin-top: 60px;
    border: 2px dashed var(--ink-soft);
    border-radius: 12px;
    padding: 64px 40px;
    text-align: center;
    background: rgba(255, 255, 255, 0.25);
    transition: background 120ms, border-color 120ms;
    cursor: pointer;
  }
  .drop.drag { background: rgba(255,255,255,0.55); border-color: var(--ink); }
  .drop h2 {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 32px;
    margin: 0 0 10px;
  }
  .drop p { margin: 0; color: var(--ink-soft); font-size: 15px; }
  .btn {
    margin-top: 22px;
    display: inline-block;
    background: var(--ink);
    color: #f8f3e6;
    padding: 12px 22px;
    border-radius: 999px;
    border: 0;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  .btn:hover { background: #1a3558; }
  .hidden { display: none !important; }

  /* ===== Status / error ===== */
  .status {
    margin-top: 20px;
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.4); opacity: 0.4; }
  }
  .error {
    background: #fde6dd; color: #8a2a0a;
    padding: 14px 18px; border-radius: 6px;
    margin-top: 20px; font-size: 14px;
  }

  .reset {
    margin-top: 40px;
    font-size: 13px;
    color: var(--ink-soft);
    text-decoration: underline;
    cursor: pointer;
    background: none; border: 0; padding: 0;
    font-family: inherit;
  }
</style>
</head>
<body>
  <nav>
    <div class="links">
      <a href="#" class="active">Library</a>
      <a href="#">My Notes</a>
      <a href="#">Collections</a>
    </div>
    <div class="avatar" aria-label="account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="12" cy="8.5" r="3.5" />
        <path d="M4.5 20c1.2-3.6 4-5.5 7.5-5.5s6.3 1.9 7.5 5.5" />
      </svg>
    </div>
  </nav>

  <main>
    <!-- Upload view -->
    <section id="uploadView">
      <div class="kicker">New overview</div>
      <h1 class="title" style="margin-bottom:8px">Drop a PDF. Get its spine.</h1>
      <p style="color:var(--ink-soft); max-width:560px; margin:0 0 10px">
        Upload a document of any length. We distill it into a compact, structured overview —
        each section streams in the moment it's ready.
      </p>
      <label class="drop" id="drop">
        <input id="fileInput" type="file" accept="application/pdf" class="hidden" />
        <h2>Drag &amp; drop a PDF here</h2>
        <p>…or click to choose a file</p>
        <span class="btn">Choose PDF</span>
      </label>
      <div id="uploadError" class="error hidden"></div>
    </section>

    <!-- Result view -->
    <section id="resultView" class="hidden">
      <div class="kicker">Uploaded file</div>
      <h1 class="title" id="fileTitle">—</h1>
      <div class="meta">
        <div class="item" id="readMeta">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          <span>—</span>
        </div>
        <div class="item" id="catMeta">
          <svg viewBox="0 0 24 24"><path d="M4 7h10M4 12h16M4 17h8"/></svg>
          <span>—</span>
        </div>
      </div>

      <div class="panel">
        <table class="overview">
          <thead>
            <tr>
              <th>Section Subtitle</th>
              <th>Section Summary</th>
            </tr>
          </thead>
          <tbody id="sectionsBody"></tbody>
        </table>
      </div>

      <div class="status hidden" id="status">
        <span class="dot"></span><span id="statusText">Working…</span>
      </div>
      <div class="error hidden" id="runError"></div>
      <button class="reset" id="resetBtn">← Upload another PDF</button>
    </section>
  </main>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const uploadView = $("uploadView");
  const resultView = $("resultView");
  const drop = $("drop");
  const fileInput = $("fileInput");
  const uploadError = $("uploadError");
  const fileTitle = $("fileTitle");
  const readMeta = $("readMeta").querySelector("span");
  const catMeta = $("catMeta").querySelector("span");
  const sectionsBody = $("sectionsBody");
  const statusEl = $("status");
  const statusText = $("statusText");
  const runError = $("runError");
  const resetBtn = $("resetBtn");

  drop.addEventListener("click", () => fileInput.click());
  drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("drag"); });
  drop.addEventListener("dragleave", () => drop.classList.remove("drag"));
  drop.addEventListener("drop", (e) => {
    e.preventDefault();
    drop.classList.remove("drag");
    const f = e.dataTransfer.files?.[0];
    if (f) handleFile(f);
  });
  fileInput.addEventListener("change", () => {
    const f = fileInput.files?.[0];
    if (f) handleFile(f);
  });
  resetBtn.addEventListener("click", () => location.reload());

  function showError(el, msg) {
    el.textContent = msg;
    el.classList.remove("hidden");
  }
  function setStatus(msg) {
    if (!msg) { statusEl.classList.add("hidden"); return; }
    statusText.textContent = msg;
    statusEl.classList.remove("hidden");
  }
  function formatSize(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + " MB";
    return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
  }

  async function handleFile(file) {
    uploadError.classList.add("hidden");
    if (!file.name.toLowerCase().endsWith(".pdf")) {
      return showError(uploadError, "Only PDF files are supported.");
    }
    uploadView.classList.add("hidden");
    resultView.classList.remove("hidden");
    fileTitle.textContent = file.name.replace(/\.pdf$/i, "");
    readMeta.textContent = "READING…";
    catMeta.textContent = "ANALYZING…";
    sectionsBody.innerHTML = skeletonRows(4);
    setStatus(`Uploading PDF (${formatSize(file.size)})…`);

    let resp;
    try {
      resp = await fetch("/api/process", {
        method: "POST",
        headers: {
          "Content-Type": "application/pdf",
          "X-Filename": encodeURIComponent(file.name),
        },
        body: file,
      });
    } catch (e) {
      setStatus(null);
      return showError(runError, "Network error: " + e.message);
    }
    if (!resp.ok) {
      setStatus(null);
      return showError(runError, "Server error: " + resp.status + " " + (await resp.text()));
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    let firstSection = true;
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf("\n\n")) !== -1) {
        const raw = buf.slice(0, idx).trim();
        buf = buf.slice(idx + 2);
        if (!raw.startsWith("data:")) continue;
        let payload;
        try { payload = JSON.parse(raw.slice(5).trim()); } catch { continue; }
        firstSection = handleEvent(payload, firstSection);
      }
    }
  }

  function skeletonRows(n) {
    let html = "";
    for (let i = 0; i < n; i++) {
      html += `<tr class="pending">
        <td class="subtitle"><span class="skeleton" style="width:60%"></span></td>
        <td class="summary">
          <span class="skeleton" style="width:95%"></span><br>
          <span class="skeleton" style="width:80%; margin-top:6px"></span>
        </td>
      </tr>`;
    }
    return html;
  }

  function handleEvent(ev, firstSection) {
    switch (ev.kind) {
      case "document":
        fileTitle.textContent = ev.filename;
        readMeta.textContent = `${ev.read_minutes} MIN READ`;
        break;
      case "status":
        setStatus(ev.message);
        break;
      case "meta":
        if (ev.category) catMeta.textContent = ev.category;
        break;
      case "section":
        if (firstSection) {
          sectionsBody.innerHTML = "";
          firstSection = false;
        }
        const tr = document.createElement("tr");
        tr.className = "section";
        tr.innerHTML = `
          <td class="subtitle"></td>
          <td class="summary"></td>`;
        tr.children[0].textContent = ev.subtitle || "";
        tr.children[1].textContent = ev.summary || "";
        sectionsBody.appendChild(tr);
        break;
      case "done":
        setStatus(null);
        if (firstSection) {
          sectionsBody.innerHTML = "";
          showError(runError, "No sections were produced. The document may be empty or unreadable.");
        }
        break;
      case "error":
        setStatus(null);
        if (firstSection) sectionsBody.innerHTML = "";
        showError(runError, ev.message || "Unknown error");
        break;
    }
    return firstSection;
  }
})();
</script>
</body>
</html>
